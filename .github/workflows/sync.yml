name: Sync AGENTS.md to downstream repos

on:
  push:
    branches: [main]
    paths:
      - "agents-md/**"
      - "scripts/build-agents-md.sh"
      - "scripts/sync.sh"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no PRs created)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 (2026-06)

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Verify sync token is configured
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SYNC_READWRITE_TOKEN }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "::error::AGENTS_SYNC_READWRITE_TOKEN secret is not set on this repo. Create a fine-grained PAT (or classic PAT with repo scope, for multi-account coverage) with contents:write and pull-requests:write scopes on all target repos and add it as a repo secret named AGENTS_SYNC_READWRITE_TOKEN. See README." >&2
            exit 1
          fi

      - name: Run sync
        env:
          # Token requires: contents:write (push branches), pull_requests:write (open PRs),
          # metadata:read (list repos) on all target repos in the org.
          GH_TOKEN: ${{ secrets.AGENTS_SYNC_READWRITE_TOKEN }}
          SYNC_OWNERS: "Adam-S-Daniel jodidaniel"
        run: |
          chmod +x scripts/sync.sh scripts/build-agents-md.sh
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            ./scripts/sync.sh --dry-run
          else
            ./scripts/sync.sh
          fi
