name: Nightly drift report

on:
  schedule:
    - cron: "0 6 * * *"       # 06:00 UTC daily
  workflow_dispatch:           # manual trigger

permissions:
  contents: write              # needed to commit drift-report.md

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 (2026-06)
        with:
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # ── Per-owner read tokens from the agents-md-sync GitHub App ──
      # The same App as sync; here only its read access is exercised (list
      # repos, read CLAUDE.md/AGENTS.md, list open sync PRs). continue-on-error
      # plus the github.token base fallback below keep the report in its
      # documented degraded mode (public repos only) if an owner's install is
      # missing, rather than hard-failing the nightly job.
      - name: Mint installation token for Adam-S-Daniel
        id: token_adam_s_daniel
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Adam-S-Daniel

      - name: Mint installation token for jodidaniel
        id: token_jodidaniel
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: jodidaniel

      - name: Generate drift report
        env:
          # Base fallback: github.token can still read this repo's owner's
          # public repos if App minting fails (the documented degraded mode).
          # GH_TOKEN_<OWNER> (minted above) takes precedence per owner.
          GH_TOKEN: ${{ github.token }}
          GH_TOKEN_ADAM_S_DANIEL: ${{ steps.token_adam_s_daniel.outputs.token }}
          GH_TOKEN_JODIDANIEL: ${{ steps.token_jodidaniel.outputs.token }}
          SYNC_OWNERS: "Adam-S-Daniel jodidaniel"
        run: |
          chmod +x scripts/drift-report.sh scripts/build-agents-md.sh
          ./scripts/drift-report.sh

      - name: Commit and push drift report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drift-report.md
          git diff --cached --quiet && echo "No changes to report." && exit 0
          git commit -m "chore: update drift report [skip ci]"
          git push
