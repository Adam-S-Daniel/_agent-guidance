name: Nightly drift report

on:
  schedule:
    - cron: "0 6 * * *"       # 06:00 UTC daily
  workflow_dispatch:           # manual trigger

permissions:
  contents: write              # create-pull-request commits the report to a branch
  pull-requests: write         # ...and opens/updates the standing drift-report PR

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1 (2026-06)
        with:
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # ── Per-owner read tokens from the agents-md-sync GitHub App ──
      # The same App as sync; here only its read access is exercised (list
      # repos, read CLAUDE.md/AGENTS.md, list open sync PRs). continue-on-error
      # plus the github.token base fallback below keep the report in its
      # documented degraded mode (public repos only) if an owner's install is
      # missing, rather than hard-failing the nightly job.
      - name: Mint installation token for Adam-S-Daniel
        id: token_adam_s_daniel
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Adam-S-Daniel

      - name: Mint installation token for jodidaniel
        id: token_jodidaniel
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: jodidaniel

      - name: Generate drift report
        env:
          # Base fallback: github.token can still read this repo's owner's
          # public repos if App minting fails (the documented degraded mode).
          # GH_TOKEN_<OWNER> (minted above) takes precedence per owner.
          GH_TOKEN: ${{ github.token }}
          GH_TOKEN_ADAM_S_DANIEL: ${{ steps.token_adam_s_daniel.outputs.token }}
          GH_TOKEN_JODIDANIEL: ${{ steps.token_jodidaniel.outputs.token }}
          SYNC_OWNERS: "Adam-S-Daniel jodidaniel"
        run: |
          chmod +x scripts/drift-report.sh scripts/build-agents-md.sh
          ./scripts/drift-report.sh

      # Under the branch ruleset that requires a PR before merging, the old
      # "git push to main" as github-actions[bot] is rejected and the nightly
      # job fails whenever there is drift. Instead, carry the regenerated report
      # on one reusable branch and open/update a single standing PR. This is
      # idempotent — subsequent nightly runs update that PR in place rather than
      # piling up new ones — and mirrors how sync.yml already lands changes on
      # main via PRs. When there is no drift, no PR is created (and any stale
      # branch is deleted), matching the old "No changes to report" early exit.
      - name: Open or update drift-report PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1 (2026-04)
        with:
          token: ${{ github.token }}
          add-paths: drift-report.md
          branch: drift-report/update
          base: main
          delete-branch: true
          commit-message: "chore: update drift report [skip ci]"
          committer: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          title: "chore: nightly AGENTS.md drift report"
          body: |
            Automated nightly regeneration of `drift-report.md` (the AGENTS.md
            drift dashboard) by the **Nightly drift report** workflow.

            Opened as a pull request instead of pushed directly to `main` so the
            job stays green under the branch ruleset that requires a PR before
            merging (direct pushes by `github-actions[bot]` are blocked). This PR
            reuses one branch (`drift-report/update`), so later nightly runs
            update it in place rather than opening a fresh PR each night.

            Review and merge (or enable native auto-merge) to land the refreshed
            report on `main`.
